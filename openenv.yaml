spec_version: 1
name: ticket_router
type: space
runtime: fastapi
app: server.app:app
port: 7860
rubrics:
  - name: triage_easy
    class: server.rubrics.BasicRoutingRubric
  - name: triage_medium
    class: server.rubrics.ExtractionRoutingRubric
  - name: triage_hard
    class: server.rubrics.PIIRedactionRubric

tasks:
  - id: triage_easy
    name: triage_easy
    description: "Basic department routing."
    grader: triage_easy
    env:
      TICKET_ROUTER_TASK: triage_easy
  - id: triage_medium
    name: triage_medium
    description: "Department routing and error code extraction."
    grader: triage_medium
    env:
      TICKET_ROUTER_TASK: triage_medium
  - id: triage_hard
    name: triage_hard
    description: "PII redaction and routing."
    grader: triage_hard
    env:
      TICKET_ROUTER_TASK: triage_hard
