spec_version: 1
name: ticket_router
type: space
runtime: fastapi
app: server.app:app
port: 7860
rubrics:
  - name: easy
    class: server.rubrics.BasicRoutingRubric
  - name: medium
    class: server.rubrics.ExtractionRoutingRubric
  - name: hard
    class: server.rubrics.PIIRedactionRubric

tasks:
  - id: easy
    name: easy
    description: "Basic department routing."
    grader: easy
    env:
      TICKET_ROUTER_TASK: easy
  - id: medium
    name: medium
    description: "Department routing and error code extraction."
    grader: medium
    env:
      TICKET_ROUTER_TASK: medium
  - id: hard
    name: hard
    description: "PII redaction and routing."
    grader: hard
    env:
      TICKET_ROUTER_TASK: hard
