spec_version: 1
name: ticket_router
type: space
runtime: fastapi
app: server.app:app
port: 7860
tasks:
  - name: basic_routing
    description: "Route support emails to the correct department (Sales, Billing, Tech Support)."
    env:
      TICKET_ROUTER_TASK: basic_routing
  - name: extraction_routing
    description: "Route emails and extract the technical error code (e.g., ERR-404)."
    env:
      TICKET_ROUTER_TASK: extraction_routing
  - name: pii_redaction
    description: "Route emails and redact all Personally Identifiable Information (CC, SSN, DOB)."
    env:
      TICKET_ROUTER_TASK: pii_redaction
